<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社区诊所预约挂号系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">🏥</div>
        <h2>社区诊所</h2>
        <p>在线预约挂号系统</p>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="departments">
          <span class="nav-icon">👥</span>
          <span class="nav-text">科室与医生</span>
        </a>
        <a href="#" class="nav-item" data-page="triage">
          <span class="nav-icon">🤖</span>
          <span class="nav-text">智能导诊</span>
        </a>
        <a href="#" class="nav-item" data-page="appointment">
          <span class="nav-icon">📅</span>
          <span class="nav-text">预约挂号</span>
        </a>
        <a href="#" class="nav-item" data-page="queue">
          <span class="nav-icon">🔔</span>
          <span class="nav-text">排队叫号</span>
        </a>
        <a href="#" class="nav-item" data-page="records">
          <span class="nav-icon">📋</span>
          <span class="nav-text">病历管理</span>
        </a>
        <a href="#" class="nav-item" data-page="followups">
          <span class="nav-icon">📞</span>
          <span class="nav-text">随访管理</span>
        </a>
        <a href="#" class="nav-item" data-page="family">
          <span class="nav-icon">👨‍👩‍👧‍👦</span>
          <span class="nav-text">家庭成员</span>
        </a>
        <a href="#" class="nav-item" data-page="drugs">
          <span class="nav-icon">💊</span>
          <span class="nav-text">药品管理</span>
        </a>
        <a href="#" class="nav-item" data-page="reviews">
          <span class="nav-icon">⭐</span>
          <span class="nav-text">评价反馈</span>
        </a>
        <a href="#" class="nav-item" data-page="stats">
          <span class="nav-icon">📊</span>
          <span class="nav-text">数据统计</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="role-selector">
          <label>当前身份：</label>
          <select id="currentPatient">
            <option value="">请选择患者</option>
          </select>
        </div>
        <div class="role-selector">
          <label>医生端：</label>
          <select id="currentDoctor">
            <option value="">请选择医生</option>
          </select>
        </div>
      </div>
    </aside>
    <main class="main-content">
      <div class="page" id="page-departments"></div>
      <div class="page" id="page-triage" style="display:none"></div>
      <div class="page" id="page-appointment" style="display:none"></div>
      <div class="page" id="page-queue" style="display:none"></div>
      <div class="page" id="page-records" style="display:none"></div>
      <div class="page" id="page-followups" style="display:none"></div>
      <div class="page" id="page-family" style="display:none"></div>
      <div class="page" id="page-drugs" style="display:none"></div>
      <div class="page" id="page-reviews" style="display:none"></div>
      <div class="page" id="page-stats" style="display:none"></div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal" id="modalContent"></div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
